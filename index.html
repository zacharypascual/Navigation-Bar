<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>

    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid black;
        }

        .logo {
            font-weight: bold;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 30px;
        }

        .menu {
            display: flex;
            gap: 20px;
            font-size: 20px;
        }

        .menu a {
            color: black;
            text-decoration: none;
        }

        .menu a:hover {
            text-decoration: underline;
            color: hsl(240, 100%, 60%);
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Logo" height="75px">Student Portal</div> 
        <nav class="menu">
            <a href="#">Home</a>
            <a href="#">Courses</a>
            <a href="#">Grade</a>
            <a href="#">Contact</a>
        </nav>
    </header>   
</body>
</html>
